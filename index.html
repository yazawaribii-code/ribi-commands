<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>莉比的魔法指令書</title>
    
    <link rel="shortcut icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="icon" href="favicon.png" type="image/png">

    <style>
        @font-face {
            font-family: 'jf-openhuninn';
            src: url('https://cdn.jsdelivr.net/gh/justfont/open-huninn-font@1.0/font/jf-openhuninn-1.1.woff2') format('woff2');
            font-display: swap; 
        }

        :root {
            --primary-pink: #ffafcc;
            --dark-pink: #fb6f92;
            --bg-color: #fff5f8;
            --card-text: #444444;
            --magic-glow: rgba(255, 175, 204, 0.3);
        }

        .bg-fixed {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background-image: url('bg.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            z-index: -1;
        }

        body {
            font-family: 'jf-openhuninn', -apple-system, "Noto Sans TC", sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 20px 10px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            -webkit-overflow-scrolling: touch;
        }

        .header { 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            text-align: center; 
            margin-bottom: 15px;
            position: relative; z-index: 2; 
        }

        h1 { 
            color: var(--dark-pink); 
            font-size: 1.6rem; 
            letter-spacing: 1px;
            font-family: 'jf-openhuninn', sans-serif;
            font-weight: 600;
            margin: 0;
            -webkit-text-stroke: 0.05px var(--dark-pink); 
            text-shadow: 
                0.1px 0.1px 0 var(--dark-pink),
                -0.1px -0.1px 0 var(--dark-pink),
                0 4px 8px var(--magic-glow),
                2px 2px 0 #fff, -2px -2px 0 #fff, 
                2px -2px 0 #fff, -2px 2px 0 #fff,
                0 2px 0 #fff, 0 -2px 0 #fff,
                2px 0 0 #fff, -2px 0 0 #fff;
        }

        .magic-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .magic-wand {
            width: 35px;
            height: auto;
            animation: wandSwing 2s ease-in-out infinite;
            transform-origin: bottom left;
            z-index: 3;
        }

        .particles {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 15px;
            opacity: 0;
            animation: particleFloatDown 2.5s infinite;
        }

        @keyframes wandSwing {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(25deg); }
        }

        @keyframes particleFloatDown {
            0% { transform: translate(0, 0) scale(0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(15px, 50px) scale(1.1) rotate(270deg); opacity: 0; }
        }

        #search {
            width: 90%; max-width: 320px;
            padding: 12px 20px; 
            border: 2px solid #fff;
            border-radius: 25px; font-size: 16px;
            margin-bottom: 30px;
            outline: none; box-sizing: border-box;
            position: relative; z-index: 2;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px var(--magic-glow);
            font-family: 'jf-openhuninn', sans-serif;
            transition: all 0.3s ease;
        }

        #search:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: var(--primary-pink);
        }

        .category-section {
            width: 100%; max-width: 600px; 
            margin-bottom: 35px;
            position: relative; z-index: 2;
        }

        .category-title {
            display: inline-block;
            font-size: 1rem;
            color: white; 
            background: var(--dark-pink); 
            padding: 6px 18px; 
            margin-bottom: 15px;
            font-weight: bold;
            border-radius: 20px;
            box-shadow: 3px 3px 10px var(--magic-glow);
            font-family: 'jf-openhuninn', sans-serif;
            margin-left: 10px;
        }

        .command-grid {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 5px 10px 15px 10px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .command-grid::-webkit-scrollbar { height: 6px; }
        .command-grid::-webkit-scrollbar-track { 
            background: rgba(255, 255, 255, 0.4); 
            border-radius: 10px; margin: 0 10px;
        }
        .command-grid::-webkit-scrollbar-thumb { 
            background: var(--primary-pink); 
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.9);
        }

        .cmd-card {
            flex: 0 0 95px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px; 
            padding: 14px 5px;
            text-align: center; 
            box-shadow: 0 3px 8px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 229, 236, 0.6);
            cursor: pointer;
            scroll-snap-align: start;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .cmd-card span { 
            font-weight: bold; 
            color: var(--card-text); 
            font-size: 0.9rem;
            font-family: 'jf-openhuninn', sans-serif;
        }

        @media (max-width: 600px) {
            body { padding-top: 10px; }
            h1 { font-size: 1.4rem; }
            .command-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                overflow-x: hidden;
                gap: 10px;
                padding: 5px;
            }
            .cmd-card { width: 100%; }
            .magic-wand { width: 30px; }
        }

        #toast {
            position: fixed; bottom: 50px;
            background: rgba(251, 111, 146, 0.9);
            color: white; padding: 10px 25px; border-radius: 30px;
            display: none; z-index: 100;
            font-family: 'jf-openhuninn', sans-serif;
            box-shadow: 0 4px 15px var(--magic-glow);
        }

        /* ===== 編輯區（預設隱藏） ===== */
        #editor-section {
            display: none;
            width: 90%; max-width: 600px;
            margin: 20px auto 40px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 24px;
            border: 2px dashed var(--primary-pink);
            padding: 24px 20px;
            box-sizing: border-box;
            position: relative; z-index: 2;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        #editor-section h2 {
            color: var(--dark-pink);
            font-family: 'jf-openhuninn', sans-serif;
            font-size: 1.1rem;
            margin: 0 0 4px;
        }

        .editor-note {
            font-size: 0.78rem;
            color: #bbb;
            margin: 0 0 18px;
            font-family: 'jf-openhuninn', sans-serif;
            line-height: 1.6;
        }

        .editor-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .editor-row select,
        .editor-row input[type="text"] {
            font-family: 'jf-openhuninn', sans-serif;
            font-size: 0.9rem;
            padding: 9px 13px;
            border: 1.5px solid var(--primary-pink);
            border-radius: 14px;
            outline: none;
            background: rgba(255,255,255,0.95);
            color: #444;
            box-sizing: border-box;
        }

        .editor-row select { flex: 1.4; min-width: 130px; }
        .editor-row input[type="text"] { flex: 1; min-width: 100px; }

        .btn-add {
            font-family: 'jf-openhuninn', sans-serif;
            font-size: 0.9rem;
            padding: 9px 18px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            background: var(--dark-pink);
            color: white;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .btn-add:hover { background: #e85580; }

        .editor-divider {
            border: none;
            border-top: 1.5px dashed var(--primary-pink);
            margin: 16px 0;
        }

        .editor-list {
            display: flex;
            flex-direction: column;
            gap: 7px;
            max-height: 220px;
            overflow-y: auto;
        }

        .editor-list::-webkit-scrollbar { width: 5px; }
        .editor-list::-webkit-scrollbar-thumb {
            background: var(--primary-pink);
            border-radius: 10px;
        }

        .editor-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 229, 236, 0.5);
            border-radius: 12px;
            padding: 7px 12px;
            font-size: 0.88rem;
            color: #555;
            font-family: 'jf-openhuninn', sans-serif;
        }

        .editor-item-label { flex: 1; }

        .btn-del {
            font-family: 'jf-openhuninn', sans-serif;
            font-size: 0.78rem;
            padding: 4px 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: #ffc8d8;
            color: #9b0033;
            transition: background 0.2s;
        }
        .btn-del:hover { background: var(--dark-pink); color: white; }

        .btn-copy-html {
            width: 100%;
            margin-top: 18px;
            background: var(--dark-pink);
            color: white;
            font-family: 'jf-openhuninn', sans-serif;
            font-size: 1rem;
            padding: 12px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-copy-html:hover { background: #e85580; }

        .copy-hint {
            font-size: 0.75rem;
            color: #bbb;
            text-align: center;
            margin-top: 8px;
            font-family: 'jf-openhuninn', sans-serif;
            line-height: 1.7;
        }
    </style>
</head>
<body>

<div class="bg-fixed"></div>

<div class="header">
    <h1>莉比的魔法指令書</h1>
    <div class="magic-container">
        <img src="wand.png" class="magic-wand" alt="魔法棒">
        <div class="particles">
            <img src="star.png" class="particle" style="animation-delay: 0s; top: -10px; left: 15px;">
            <img src="heart.png" class="particle" style="animation-delay: 0.8s; top: -5px; left: 25px;">
            <img src="star.png" class="particle" style="animation-delay: 1.6s; top: -8px; left: 10px;">
        </div>
    </div>
</div>

<input type="text" id="search" placeholder="🩷 搜尋指令...">

<div id="main-container" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>

<!-- 編輯區：平常隱藏，網址加 ?edit 才顯示 -->
<div id="editor-section">
    <h2>🛠️ 編輯指令</h2>
    <p class="editor-note">新增或刪除指令後，按下方按鈕複製 HTML，再貼回 index.html 存檔上傳 GitHub 就完成囉！</p>

    <div class="editor-row">
        <select id="editor-cat"></select>
        <input type="text" id="editor-cmd" placeholder="指令名稱（不用加 !）" maxlength="30">
        <button class="btn-add" onclick="editorAdd()">新增</button>
    </div>

    <hr class="editor-divider">

    <div class="editor-list" id="editor-list"></div>

    <button class="btn-copy-html" onclick="copyHTML()">📋 複製更新後的 HTML</button>
    <p class="copy-hint">複製 → 打開 index.html → 全選 → 貼上 → 存檔 → 上傳 GitHub ✨</p>
</div>

<div id="toast"></div>

<script>
    const categories = {
        "⭐ 音效指令": [
                "啾",
                "欸嘿",
                "BB",
                "FBI",
                "PADORU",
                "安安",
                "omg",
                "hp",
                "一代一代一代",
                "好笑",
                "SW",
                "OH",
                "BM",
                "HA",
                "哭喔",
                "女巫",
                "瞎掰",
                "bui",
                "吉娃娃"
        ],
        "⭐ 即時互動": [
                "捏",
                "砸",
                "摸頭",
                "pon"
        ],
        "⭐ 釣魚遊戲": [
                "釣",
                "LB"
        ],
        "⭐ 互動元件說明": [
                "糰子說明",
                "星星",
                "糰子"
        ],
        "⭐ 其他": [
                "sr",
                "歌單",
                "委託",
                "降落詞",
                "布丁",
                "台規",
                "dc"
        ]
};

    const mainContainer = document.getElementById('main-container');
    const searchInput = document.getElementById('search');
    const toast = document.getElementById('toast');

    /* ── 網址判斷：有 ?edit 才顯示編輯區 ── */
    if (location.search.includes('edit')) {
        document.getElementById('editor-section').style.display = 'block';
        initEditor();
    }

    /* ── 主頁渲染 ── */
    function render(filter = "") {
        mainContainer.innerHTML = "";
        for (const [catName, cmdList] of Object.entries(categories)) {
            const filtered = cmdList.filter(cmd =>
                cmd.toLowerCase().includes(filter.toLowerCase()) ||
                catName.toLowerCase().includes(filter.toLowerCase())
            );
            if (!filtered.length) continue;

            const section = document.createElement('div');
            section.className = 'category-section';

            const title = document.createElement('div');
            title.className = 'category-title';
            title.innerText = catName;
            section.appendChild(title);

            const grid = document.createElement('div');
            grid.className = 'command-grid';
            filtered.forEach(cmd => {
                const card = document.createElement('div');
                card.className = 'cmd-card';
                card.onclick = () => copyText(`!${cmd}`);
                card.innerHTML = `<span>!${cmd}</span>`;
                grid.appendChild(card);
            });
            section.appendChild(grid);
            mainContainer.appendChild(section);
        }
    }

    function copyText(text) {
        navigator.clipboard.writeText(text).then(() => {
            showToast(`已複製 ${text} ✨`);
            if (navigator.vibrate) navigator.vibrate(30);
        });
    }

    searchInput.addEventListener('input', e => render(e.target.value));
    render();

    /* ── 編輯區 ── */
    function initEditor() {
        const sel = document.getElementById('editor-cat');
        sel.innerHTML = '';
        for (const cat of Object.keys(categories)) {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.textContent = cat;
            sel.appendChild(opt);
        }
        renderEditorList();
    }

    function renderEditorList() {
        const list = document.getElementById('editor-list');
        list.innerHTML = '';
        for (const [cat, cmds] of Object.entries(categories)) {
            cmds.forEach((cmd, idx) => {
                const item = document.createElement('div');
                item.className = 'editor-item';
                item.innerHTML = `
                    <span class="editor-item-label">${cat.replace('⭐ ', '')} → !${cmd}</span>
                    <button class="btn-del" onclick="editorDelete('${cat}',${idx})">刪除</button>
                `;
                list.appendChild(item);
            });
        }
    }

    function editorAdd() {
        const cat = document.getElementById('editor-cat').value;
        const input = document.getElementById('editor-cmd');
        const cmd = input.value.trim();
        if (!cmd) { showToast('請輸入指令名稱！'); return; }
        if (categories[cat].includes(cmd)) { showToast('這個指令已存在！'); return; }
        categories[cat].push(cmd);
        input.value = '';
        render();
        renderEditorList();
        showToast(`已新增 !${cmd} ✨`);
    }

    function editorDelete(cat, idx) {
        const cmd = categories[cat][idx];
        if (!confirm(`確定要刪除 !${cmd} 嗎？`)) return;
        categories[cat].splice(idx, 1);
        render();
        renderEditorList();
        showToast(`已刪除 !${cmd}`);
    }

    async function copyHTML() {
        try {
            /* 用 fetch 抓原始檔案文字，不用 DOM，所以不會帶入編輯區顯示狀態 */
            const res = await fetch(location.pathname + location.search);
            let src = await res.text();

            /* 把 categories 換成目前編輯後的版本 */
            const catJSON = JSON.stringify(categories, null, 8);
            const marker = 'const categories = ';
            const start = src.indexOf(marker);
            let depth = 0, end = -1;
            for (let i = start + marker.length; i < src.length; i++) {
                if (src[i] === '{') depth++;
                if (src[i] === '}') { depth--; if (depth === 0) { end = i + 1; break; } }
            }
            if (start === -1 || end === -1) { showToast('找不到資料，請重新整理再試'); return; }

            const newHTML = src.slice(0, start) + marker + catJSON + src.slice(end);
            await navigator.clipboard.writeText(newHTML);
            showToast('✅ 複製成功！貼回 index.html 再上傳就好～');
        } catch (e) {
            showToast('複製失敗，請確認是用電腦瀏覽器開啟檔案');
        }
    }

    function showToast(msg) {
        toast.innerText = msg;
        toast.style.display = 'block';
        clearTimeout(toast._t);
        toast._t = setTimeout(() => { toast.style.display = 'none'; }, 1800);
    }
</script>

</body>
</html>
